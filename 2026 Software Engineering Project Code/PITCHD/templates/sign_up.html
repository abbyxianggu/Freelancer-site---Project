<!--Form-->
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container">
  <div class="card">

    <h1>Create Your Account</h1>
    <p class="subtitle">Sign Up for PITCHD</p>
    <form>

  <!-- Google -->
  <button type="button" class="btn-google">
    <span class="g">G</span>
    Continue with Google
  </button>

  <!--divider-->
  <div class="divider">
    <span></span>
    <p>Or</p>
    <span></span>
  </div>

      <!-- Email -->
      <label>Email address</label>
      <div class="input-group">
        <span class="icon">✉️</span>
        <input type="email" placeholder="email@address.com">
      </div>

      <!-- Password -->
      <label>Password</label>
      <div class="input-group">
        <span class="icon">🔒</span>
        <input type="password" placeholder="••••••••">
        <span class="icon right">👁</span>
      </div>
      <!-- Confirm Password -->
       <label> Confirm Password</label>
       <div class="input-group">
        <span class= "icon">🔒</span>
        <input type="confirmpassword" placeholder="••••••••">
       </div>
           <!-- Agree TOS -->
          <div class="agreetos">
            <input type="checkbox" id="agreetos">
            <label for="agreetos">By creating an account, 
              you are agreeing to the Terms of Service and Privacy Policy.</label>
          </div>

          <div class="divider">
            <span></span>
            <p></p>
            <span></span>
          </div>
        

      <!-- Signup button -->
      <button type="submit" class="btn-primary">Sign Up</button>


      
    </form>

  </div>
</div>
