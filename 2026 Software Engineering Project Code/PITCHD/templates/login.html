{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block main %}
<link rel="stylesheet" href="{{ url_for('static', filename='signup.css') }}">
<style>
#login_nav{
  font-weight:bold;
  border-bottom: 2px solid #8800ff;
}
</style>
<h1 style="color:#8800ff; text-align:center; margin-top:70px;">Login</h1>
<div style="display: flex; justify-content: center; align-items: center;">
  <form class="card" style="justify-content: center;" method="POST">
    <h2>Login to your account</h2>
    <label for="username">username</label>
    <input type="text" id="username" placeholder="Username" name="username"/>
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@example.com" name="email"/>
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••", name="password"/>
    <label for="confirm">Confirm password</label>
    <input type="password" id="confirm" placeholder="••••••••", name="confirm_password"/>
    <button type="submit" style="width: 100%; padding: 0.7rem; background: #6c63ff; color: white; border: none; border-radius: 8px; font-size: 1rem;">Log in</button>
    <p>Don't have an account? <a href="sign_up" style="color: #6c63ff; text-decoration: none;">Sign up</a></p>
  </form>
</div>

{% endblock %}
