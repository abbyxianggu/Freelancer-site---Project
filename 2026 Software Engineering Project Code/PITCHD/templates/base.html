<!DOCTYPE html>
<title>{% block title %} BASE {% endblock %}</title>

    <!--Link to BOOTSTRAP and ICON CDN stuff, not super important to know-->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
   
<body>
<!-- ── NAVBAR WRAPPER ── -->
<div class="navbar-wrapper">
    <nav class="navbar" role="navigation" aria-label="Main navigation">
      <a href="#" class="navbar__brand" aria-label="PITCHD Home">
        <img
          class="navbar__logo"
          src="https://www.figma.com/api/mcp/asset/6392430e-f293-445f-9e22-cd2f7d2cb11e"
          alt="PITCHD logo" />
        <span class="navbar__name">PITCHD</span>
      </a>
  
      <ul class="navbar__links" id="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="#">Find work</a></li>
        <li><a href="#">Find Freelancers</a></li>
        <li><a href="login">Log In</a></li>
        <li><a href="sign_up">Sign Up</a></li>
        <li><a href="#">Profile</a></li>
      </ul>
  
      <button class="navbar__cta" href="postjob" >Post a project</button>
  
      <button
        class="navbar__hamburger"
        id="hamburger-btn"
        aria-expanded="false"
        aria-controls="mobile-menu"
        aria-label="Toggle navigation menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </nav>
    <script>
        (function () {
          var btn = document.getElementById('hamburger-btn');
          var menu = document.getElementById('mobile-menu');
      
          if (!btn || !menu) return;
      
          btn.addEventListener('click', function () {
            var isOpen = menu.classList.toggle('is-open');
            btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
          });
      
          // Close menu when a link is clicked
          menu.querySelectorAll('a').forEach(function (link) {
            link.addEventListener('click', function () {
              menu.classList.remove('is-open');
              btn.setAttribute('aria-expanded', 'false');
            });
          });
      
          // Close menu on outside click
          document.addEventListener('click', function (e) {
            if (!btn.contains(e.target) && !menu.contains(e.target)) {
              menu.classList.remove('is-open');
              btn.setAttribute('aria-expanded', 'false');
            }
          });
        })();
      </script>
